<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jejak</title>

    <link rel="stylesheet" href="css/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>

<body>

<div class="overlay"></div>

<div id="app">

    <!-- LANDING -->
    <section class="page active" id="landing">

        <div class="content">

            <p class="title-small">jejak</p>

            <h1>1957 – 2023</h1>

            <p class="quote">
                Tepat seribu putaran matahari
                sejak engkau pulang.
            </p>

            <div class="buttons">

                <button id="interactiveBtn">
                    Jelajahi
                </button>

                <button id="autoBtn">
                    Putar Kenangan
                </button>

            </div>

        </div>

    </section>


    <!-- UCAPAN -->
    <section class="page" id="ucapan">

        <div class="page-content">

            <p class="section-label">
                Ucapan Keluarga
            </p>

            <h2>
                Assalamu'alaikum
                Warahmatullahi
                Wabarakatuh
            </h2>

            <p class="section-text">

                Dengan penuh rasa syukur
                dan kerendahan hati,
                kami mengundang Bapak/Ibu
                untuk bersama-sama
                mendoakan almarhum.

            </p>

            <button class="next-btn"
                    data-next="puisi">

                Lanjut

            </button>

        </div>

    </section>


    <!-- PUISI -->
    <section class="page" id="puisi">

        <div class="page-content">

            <p class="section-label">

                Jejak

            </p>

            <blockquote>

                beberapa ingatan,<br>
                tetap tinggal.

            </blockquote>

            <button class="next-btn"
                    data-next="yasin">

                Lanjut

            </button>

        </div>

    </section>

</div>

<script src="js/script.js"></script>

</body>
</html>
